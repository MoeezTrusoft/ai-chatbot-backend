service: video_trailer
version: 2.2.0
display_name: Video Trailer
currency: USD
calculation_model: video_length_grid
required_inputs:
- field: tier
  question: 'Which trailer tier is needed: essential, professional, premium, or cinematic?'
- field: video_length_seconds
  question: 'What video length is needed: 30, 60, 90, or 120 seconds?'
- field: production_style
  question: 'What production style is needed: simple_motion, cinematic_stock, animated, or custom?'
package_grid:
  unit_type: video_seconds
  rates:
    essential:
      '30': 500
      '60': 750
      '90': 1000
      '120': 1250
    professional:
      '30': 700
      '60': 1000
      '90': 1350
      '120': 1700
    premium:
      '30': 1400
      '60': 2100
      '90': 2800
      '120': 3500
    cinematic:
      '30': 2500
      '60': 3750
      '90': 5000
      '120': 6250
base_duration_days:
  essential: 20
  professional: 30
  premium: 40
  cinematic: 60
complexity:
  factor_name: VCF
  mode: points
  point_multiplier: 0.08
  max_factor: 2.0
  drivers:
  - field: visual_style
    label: Visual style
    options:
    - value: stock
      points: 0
      group: general
    - value: mixed_media
      points: 0.4
      group: general
    - value: 2d_animation
      points: 0.8
      group: general
    - value: 3d_animation
      points: 1.2
      group: general
  - field: animation_level
    label: Animation level
    options:
    - value: none
      points: 0
      group: general
    - value: basic_motion
      points: 0.5
      group: general
    - value: 2d_character
      points: 0.9
      group: general
    - value: 3d_character
      points: 1.4
      group: general
  - field: voiceover_type
    label: Voiceover type
    options:
    - value: none
      points: 0
      group: general
    - value: ai
      points: 0.2
      group: general
    - value: professional
      points: 0.5
      group: general
    - value: celebrity
      points: 0.9
      group: general
  - field: music_type
    label: Music type
    options:
    - value: stock
      points: 0
      group: general
    - value: licensed
      points: 0.3
      group: general
    - value: custom
      points: 0.7
      group: general
  - field: sound_design_level
    label: Sound design level
    options:
    - value: basic
      points: 0
      group: general
    - value: enhanced
      points: 0.4
      group: general
    - value: cinema
      points: 0.8
      group: general
  - field: text_title_animation
    label: Text/title animation
    options:
    - value: basic
      points: 0
      group: general
    - value: animated
      points: 0.3
      group: general
    - value: kinetic
      points: 0.6
      group: general
  - field: color_grading_level
    label: Color grading level
    options:
    - value: basic
      points: 0
      group: general
    - value: enhanced
      points: 0.3
      group: general
    - value: cinematic
      points: 0.7
      group: general
  - field: visual_effects_level
    label: Visual effects level
    options:
    - value: none
      points: 0
      group: general
    - value: basic
      points: 0.4
      group: general
    - value: advanced
      points: 0.9
      group: general
    - value: vfx_heavy
      points: 1.4
      group: general
  - field: illustration_style
    label: Illustration style
    options:
    - value: stock_assets
      points: 0
      group: general
    - value: custom_illustrations
      points: 0.5
      group: general
    - value: premium_art
      points: 0.9
      group: general
  - field: aspect_ratios
    label: Aspect ratios
    options:
    - value: single
      points: 0
      group: general
    - value: dual
      points: 0.2
      group: general
    - value: multiple
      points: 0.4
      group: general
  - field: platform_optimization
    label: Platform optimization
    options:
    - value: single
      points: 0
      group: general
    - value: multiple
      points: 0.3
      group: general
    - value: all_platforms
      points: 0.6
      group: general
