assumptions:
- Video trailer estimate assumes client supplies approved book assets, synopsis, and brand direction.
exclusions:
- Licensed footage, talent, and original music are excluded unless separately approved.
source_reference: VideoTrailer_Price&TimeEngine.xlsx, normalized into v2.2 config.
timeline_policy:
  max_compression_ratio: 2.5
  min_schedule_multiplier: 1.1
  max_schedule_multiplier: 2.5
  rush_slope: 0.8
  relax_slope: 0.05
  service_beta: 1.0
timeline_tuning:
  factor_name: VTLF
  rush_slope: 0.8
  relax_slope: 0.05
  min_tlf: 1.1
  max_tlf: 2.5
  service_multipliers:
    standard:
      beta: 1
      min_tlf: 1.1
      max_tlf: 1.8
    rush:
      beta: 1.5
      min_tlf: 1.3
      max_tlf: 2.1
    express:
      beta: 2
      min_tlf: 1.7
      max_tlf: 2.5
