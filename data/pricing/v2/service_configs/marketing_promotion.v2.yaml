service: marketing_promotion
version: 2.2.0
display_name: Marketing & Promotion
currency: USD
calculation_model: campaign_package
required_inputs:
- field: tier
  question: 'Which marketing tier is needed: launch_essentials, professional_campaign, or premium_blitz? Enterprise
    rollout is custom-quote/human-review only because the workbook has no auto-pricing grid for it.'
- field: campaign_duration
  question: 'What campaign duration is needed: 1_month, 3_months, 6_months, or 12_months?'
- field: primary_goal
  question: 'What is the main marketing goal: awareness, launch_support, reviews, lead_generation, or sales_support?'
package_grid:
  unit_type: calendar_days
  rates:
    launch_essentials:
      1_month: 999
      3_months: 2499
      6_months: 4499
      12_months: 8499
    professional_campaign:
      1_month: 2499
      3_months: 6499
      6_months: 11999
      12_months: 21999
    premium_blitz:
      1_month: 4999
      3_months: 12999
      6_months: 23999
      12_months: 43999
base_duration_days:
  launch_essentials: 10
  professional_campaign: 15
  premium_blitz: 20
  enterprise_rollout: 30
complexity:
  factor_name: MCF
  mode: points
  point_multiplier: 0.05
  max_factor: 1.7
  drivers:
  - field: target_audience_size
    label: Target audience size
    options:
    - value: niche
      points: 0
      group: general
    - value: medium
      points: 0.3
      group: general
    - value: large
      points: 0.6
      group: general
    - value: mass
      points: 1.0
      group: general
  - field: genre_competitiveness
    label: Genre competitiveness
    options:
    - value: low
      points: 0
      group: general
    - value: medium
      points: 0.2
      group: general
    - value: high
      points: 0.5
      group: general
    - value: saturated
      points: 0.9
      group: general
  - field: existing_platform
