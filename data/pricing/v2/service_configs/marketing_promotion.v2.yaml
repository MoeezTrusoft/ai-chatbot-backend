      group: general
    - value: series_new
      points: 0.2
      group: general
    - value: series_existing
      points: -0.1
      group: general
  - field: cover_blurb_quality
    label: Cover/blurb quality
    options:
    - value: poor
      points: 0.3
      group: general
    - value: average
      points: 0.1
      group: general
    - value: good
      points: 0
      group: general
    - value: excellent
      points: -0.1
      group: general
  - field: reviews_endorsements
