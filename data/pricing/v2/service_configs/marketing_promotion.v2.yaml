      points: 0
      group: general
    - value: three_to_four
      points: 0.2
      group: general
    - value: five_plus
      points: 0.4
      group: general
  - field: paid_advertising_level
    label: Paid advertising level
    options:
    - value: none
      points: 0
      group: general
    - value: basic
      points: 0.2
      group: general
    - value: moderate
      points: 0.4
      group: general
    - value: heavy
      points: 0.7
      group: general
