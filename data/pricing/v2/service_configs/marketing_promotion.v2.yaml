assumptions:
- Marketing estimate treats active campaign duration separately from internal setup days.
- Ad spend is excluded from the service fee unless separately approved.
exclusions:
- Book sales, rankings, bestseller status, and guaranteed ROI are never guaranteed.
source_reference: Marketing_Price&TimeEngine.xlsx, normalized into v2.2 config.
enterprise_rollout_policy:
  pricing_mode: quote_only
  reason: Workbook input form lists Enterprise Rollout but provides no base-price grid values; route to human review.
timeline_policy:
  max_compression_ratio: 1.8
  min_schedule_multiplier: 0.9
  max_schedule_multiplier: 1.8
  rush_slope: 0.6
  relax_slope: 0.05
  service_beta: 1.0
timeline_tuning:
  factor_name: MTLF
  accelerated_slope: 0.6
  intensive_slope: 0.9
  min_tlf: 0.9
  max_tlf: 1.8
  campaign_duration_multipliers:
    1_month: 1.2
    3_months: 1.0
    6_months: 0.9
    12_months: 0.8
  service_multipliers:
    launch_essentials:
      beta: 1
      min_tlf: 0.9
      max_tlf: 1.5
    professional_campaign:
      beta: 1.2
      min_tlf: 1
      max_tlf: 1.6
    premium_blitz:
      beta: 1.4
      min_tlf: 1.1
      max_tlf: 1.7
