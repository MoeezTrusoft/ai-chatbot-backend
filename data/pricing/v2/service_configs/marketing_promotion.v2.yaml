service: marketing_promotion
version: "2.1.0"
display_name: "Marketing & Promotion"
currency: USD
calculation_model: campaign_package
required_inputs:
  - field: tier
    question: "Which marketing tier is needed: launch_essentials, professional_campaign, premium_blitz, or enterprise_rollout?"
  - field: campaign_duration
    question: "What campaign duration is needed: 1_month, 3_months, 6_months, or 12_months?"
  - field: primary_goal
    question: "What is the main marketing goal: awareness, launch_support, reviews, lead_generation, or sales_support?"
package_grid:
  unit_type: calendar_days
  rates:
    launch_essentials:
      1_month: 999
      3_months: 2499
      6_months: 4499
      12_months: 8499
    professional_campaign:
      1_month: 2499
      3_months: 6499
      6_months: 11999
      12_months: 21999
    premium_blitz:
      1_month: 4999
      3_months: 12999
      6_months: 23999
      12_months: 44999
    enterprise_rollout:
      1_month: 9999
      3_months: 24999
      6_months: 47999
      12_months: 89999
base_duration_days:
  launch_essentials: 10
  professional_campaign: 15
  premium_blitz: 20
  enterprise_rollout: 30
complexity:
  factor_name: MCF
  mode: points
  point_multiplier: 0.06
  max_factor: 2.0
  drivers:
    - field: audience_size
      label: "Target audience size"
      options:
        - value: niche
          points: 0
        - value: broad
          points: 2
        - value: multi_segment
          points: 4
    - field: channel_mix
      label: "Channel mix"
      options:
        - value: standard
          points: 0
        - value: multi_channel
          points: 2
        - value: full_funnel
          points: 4
add_ons:
  - code: press_release
    title: "Press Release Package"
    price_type: fixed
    price: 500
    duration_type: fixed_days
    duration_days: 3
    complexity_points: 0.20
  - code: author_brand_kit
    title: "Author Brand Kit"
    price_type: fixed
    price: 750
    duration_type: fixed_days
    duration_days: 5
    complexity_points: 0.30
  - code: paid_ad_management
    title: "Paid Ad Management Setup"
    price_type: fixed
    price: 1000
    duration_type: fixed_days
    duration_days: 5
    complexity_points: 0.40
assumptions:
  - "Marketing estimate treats active campaign duration separately from internal setup days."
  - "Ad spend is excluded from the service fee unless separately approved."
exclusions:
  - "Book sales, rankings, bestseller status, and guaranteed ROI are never guaranteed."
source_reference: "Marketing_Price&TimeEngine.xlsx, normalized into v2.1 config."
