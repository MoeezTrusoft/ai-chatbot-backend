service: audiobook_production
version: 2.2.0
display_name: Audiobook Production
currency: USD
calculation_model: per_finished_hour
required_inputs:
- field: tier
  question: 'Which audiobook tier is needed: essential, professional, premium, or studio?'
- field: finished_hours
  fallback_global_field: word_count
  question: How many finished audio hours are expected, or what is the manuscript word count?
- field: narrator_level
  question: 'What narrator level is needed: entry, professional, celebrity, or author_narration?'
rate_grid:
  unit_type: finished_hours
  minimum_fee: 500
  rates:
    essential: 150
    professional: 250
    premium: 400
    studio: 600
base_duration_days:
  essential: 20
  professional: 40
  premium: 50
  studio: 60
complexity:
  factor_name: ACF
  mode: points
  point_multiplier: 0.07
  max_factor: 2.0
  drivers:
  - field: narrator_level
    label: Narrator level
    options:
    - value: entry
      points: 0
      group: general
    - value: professional
      points: 0.3
      group: general
    - value: celebrity
      points: 0.8
      group: general
    - value: author_narration
      points: 0.5
      group: general
  - field: voice_requirements
    label: Voice requirements
    options:
    - value: single
      points: 0
      group: general
    - value: dual
      points: 0.5
      group: general
    - value: full_cast
      points: 1.2
      group: general
  - field: accent_language_complexity
    label: Accent/language complexity
    options:
    - value: standard
      points: 0
      group: general
    - value: regional
      points: 0.3
      group: general
    - value: bilingual
      points: 0.6
      group: general
    - value: multiple_languages
      points: 1.0
      group: general
  - field: recording_environment
    label: Recording environment
    options:
    - value: home
      points: 0
      group: general
    - value: professional
      points: 0.2
      group: general
    - value: broadcast_studio
      points: 0.4
      group: general
  - field: audio_quality_level
    label: Audio quality level
    options:
    - value: standard
      points: 0
      group: general
    - value: high
      points: 0.2
      group: general
    - value: premium
      points: 0.4
      group: general
  - field: mastering_level
    label: Mastering level
    options:
    - value: basic
      points: 0
      group: general
    - value: enhanced
      points: 0.3
      group: general
    - value: cinema_quality
      points: 0.7
      group: general
  - field: sound_design_level
    label: Sound design level
    options:
    - value: none
      points: 0
      group: general
    - value: basic
      points: 0.4
      group: general
    - value: enhanced
      points: 0.8
      group: general
    - value: full_production
      points: 1.2
      group: general
  - field: music_scoring
    label: Music & scoring
    options:
    - value: none
      points: 0
      group: general
    - value: intro_outro
      points: 0.3
      group: general
    - value: chapter_stings
      points: 0.6
      group: general
    - value: full_score
      points: 1.0
      group: general
  - field: book_type_difficulty
    label: Book type difficulty
    options:
    - value: fiction
      points: 0
      group: general
    - value: non_fiction
      points: 0.2
      group: general
    - value: academic
      points: 0.5
      group: general
    - value: technical
      points: 0.8
      group: general
