assumptions:
- Finished hours may be supplied directly or derived from word count using the configured words-per-finished-hour
  policy.
exclusions:
- Union talent fees, celebrity narration, and licensed music are excluded unless approved.
source_reference: Audiobook_Price&TimeEngine.xlsx, normalized into v2.2 config.
timeline_policy:
  max_compression_ratio: 2.5
  min_schedule_multiplier: 1.1
  max_schedule_multiplier: 2.5
  rush_slope: 0.9
  relax_slope: 0.03
  service_beta: 1.0
timeline_tuning:
  factor_name: ATLF
  rush_slope: 0.9
  relax_slope: 0.03
  min_tlf: 1.1
  max_tlf: 2.5
  service_multipliers:
    standard:
      beta: 1
      min_tlf: 1.1
      max_tlf: 1.8
    accelerated:
      beta: 1.4
      min_tlf: 1.5
      max_tlf: 2.2
    express:
      beta: 1.8
      min_tlf: 2
      max_tlf: 2.5
