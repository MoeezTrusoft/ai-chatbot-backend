assumptions:
- Author website setup is quoted separately from monthly hosting or maintenance.
exclusions:
- Domain purchase, premium plugins, paid themes, and third-party subscriptions are excluded unless approved.
source_reference: AuthorWeb_Price&TimeEngine.xlsx, normalized into v2.2 config.
timeline_policy:
  max_compression_ratio: 2.0
  min_schedule_multiplier: 1.0
  max_schedule_multiplier: 2.0
  rush_slope: 0.7
  relax_slope: 0.08
  service_beta: 1.0
timeline_tuning:
  factor_name: WTLF
  rush_slope: 0.7
  relax_slope: 0.08
  min_tlf: 1
  max_tlf: 2
  service_multipliers:
    standard:
      beta: 1
      min_tlf: 1
      max_tlf: 1.5
    rush:
      beta: 1.4
      min_tlf: 1.2
      max_tlf: 1.9
    express:
      beta: 1.8
      min_tlf: 1.3
      max_tlf: 2
