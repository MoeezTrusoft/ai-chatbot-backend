service: author_website
version: 2.2.0
display_name: Author Website
currency: USD
calculation_model: package_plus_recurring
required_inputs:
- field: tier
  question: 'Which author website tier is needed: starter, professional, premium, or enterprise?'
- field: website_type
  question: 'What type of website is needed: portfolio, blog_focused, book_store, or full_author_platform?'
package_grid:
  unit_type: project
  rates:
    starter:
      setup: 999
      monthly_recurring: 29
      additional_page: 150
      pages_included: 5
    professional:
      setup: 2499
      monthly_recurring: 49
      additional_page: 250
      pages_included: 8
    premium:
      setup: 4999
      monthly_recurring: 79
      additional_page: 400
      pages_included: 12
    enterprise:
      setup: 9999
      monthly_recurring: 149
      additional_page: 0
      pages_included: 20
base_duration_days:
  starter: 20
  professional: 30
  premium: 40
  enterprise: 60
complexity:
  factor_name: WCF
  mode: points
  point_multiplier: 0.06
  max_factor: 1.8
  drivers:
  - field: design_style
    label: Design style
    options:
    - value: template
      points: 0
      group: general
    - value: custom
      points: 0.5
      group: general
    - value: premium_custom
      points: 1.0
      group: general
  - field: color_scheme
    label: Color scheme
    options:
    - value: preset
      points: 0
      group: general
    - value: custom_palette
      points: 0.2
      group: general
    - value: brand_aligned
      points: 0.4
      group: general
  - field: typography
    label: Typography
    options:
    - value: standard
      points: 0
      group: general
    - value: licensed
      points: 0.2
      group: general
    - value: custom_pairing
      points: 0.4
      group: general
  - field: home_page_level
