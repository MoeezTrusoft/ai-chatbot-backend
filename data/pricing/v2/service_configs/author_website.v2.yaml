    options:
    - value: basic
      points: 0
      group: general
    - value: magazine
      points: 0.4
      group: general
    - value: advanced
      points: 0.8
      group: general
  - field: ecommerce_level
    label: E-commerce level
    options:
    - value: none
      points: 0
      group: general
    - value: simple
      points: 0.6
      group: general
    - value: full_store
      points: 1.2
      group: general
  - field: newsletter_integration_level
