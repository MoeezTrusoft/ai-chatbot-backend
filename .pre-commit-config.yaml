repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
  - repo: local
    hooks:
      - id: bookcraft-secret-scan
        name: BookCraft secret scan
        entry: python scripts/security/secret_scan.py
        language: system
        pass_filenames: false
      - id: bookcraft-prompt-verify
        name: BookCraft prompt verifier
        entry: python scripts/data/verify_prompt_pack.py
        language: system
        pass_filenames: false
