groups:
  - name: bookcraft-foundation
    rules:
      - alert: BookCraftApiTargetDown
        expr: up{job="bookcraft-api"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: BookCraft API Prometheus target is down
      - alert: BookCraftHighHttpErrorRate
        expr: sum(rate(chatbot_http_requests_total{path!="/metrics"}[5m])) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: BookCraft API request volume is anomalous
      - alert: BookCraftChatLatencySloBreach
        expr: histogram_quantile(0.95, sum(rate(chatbot_turn_latency_seconds_bucket[5m])) by (le)) > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Chat turn p95 latency breached the local SLO
      - alert: BookCraftNoTrafficAnomaly
        expr: sum(rate(chatbot_turns_total[30m])) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: No chatbot traffic observed for 30 minutes
      - alert: BookCraftLlmProviderFailures
        expr: sum(rate(intent_provider_calls_total{status!="succeeded"}[5m])) by (provider) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Intent provider failures are elevated
      - alert: BookCraftElasticsearchFailures
        expr: sum(rate(rag_queries_total{result="failed"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: RAG / Elasticsearch query failures detected
      - alert: BookCraftTeiFailures
        expr: sum(rate(embedder_latency_seconds_count[5m])) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: No TEI embedding activity observed
      - alert: BookCraftDocumentGenerationFailures
        expr: sum(rate(document_generation_failures_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Document generation failures detected
      - alert: BookCraftVerifierFailures
        expr: sum(rate(rag_rejected_chunk_total[5m])) > 0 or sum(rate(trimatch_verifier_failures_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Verifier gate failures detected
      - alert: BookCraftToolFailures
        expr: sum(rate(tool_invocation_failures_total[5m])) by (tool_name) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tool Dispatcher failures detected
      - alert: BookCraftCostSpike
        expr: sum(increase(llm_call_cost_usd_total[1h])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: LLM cost spike detected
