# LOCAL DEVELOPMENT ONLY.
# This Docker Compose file intentionally binds service ports to 127.0.0.1 by default.
# Do not reuse this file directly for staging or production without enabling auth,
# network isolation, TLS, secret management, and hardened service configs.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bookcraft
      POSTGRES_PASSWORD: bookcraft_dev
      POSTGRES_DB: bookcraft
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookcraft -d bookcraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command:
      - "--model-id"
      - "BAAI/bge-small-en-v1.5"
      - "--hostname"
      - "0.0.0.0"
      - "--port"
      - "8080"
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${TEI_HOST_PORT:-8080}:8080"
    environment:
      HF_HOME: /data
      HF_HUB_CACHE: /data/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    volumes:
      - tei-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request, json\nreq=urllib.request.Request('http://localhost:8080/embed', data=json.dumps({'inputs':'hello'}).encode(), headers={'Content-Type':'application/json'})\nurllib.request.urlopen(req, timeout=10)\nPY"
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./ops/prometheus/pricing-alerts.yml:/etc/prometheus/pricing-alerts.yml:ro
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${OTEL_PROM_HOST_PORT:-8889}:8889"
    volumes:
      - ./ops/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${DOCKER_BIND_HOST:-127.0.0.1}:${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./ops/loki/local-config.yaml:/etc/loki/local-config.yaml:ro

volumes:
  postgres-data:
  redis-data:
  es-data:
  tei-data:
  grafana-data:
